services:
    client:
        container_name: gamelist-client
        build:
            context: ./client
        restart: always
        ports:
            - "8080:80"
            - "443:443"
    server:
        container_name: gamelist-server
        build:
            context: ./server
        restart: always
        ports:
            - "8081:3000"
        env_file:
            - ./server/.env
        volumes:
            - data_volume:/app/dist/dev.db
volumes:
    data_volume:
